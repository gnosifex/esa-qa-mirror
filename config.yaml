# What to mirror. This tool is scoped to BANKING supervision: the EBA Single
# Rulebook Q&As (banking-sector acts) plus the Joint ESAs Q&As that also bind
# credit institutions (DORA today). Two discovery sources — the Joint Q&A
# Register for joint acts, the EBA's own search for sectoral acts.

delay_seconds: 1.5

# Incremental operation. Enumeration (register + EBA listing pages) runs in
# full on EVERY run — presence/absence, delisting, archive resolution and the
# count checks stay daily. Detail pages are fetched for new/reappearing
# records, recent publications (window), and the oldest-verified records
# within the daily budget. A full content sweep runs whenever the last
# completed one is older than sweep_after_days — state-driven, so a failed
# sweep simply retries on the next run (no calendar coupling).
incremental:
  verify_after_days: 7      # re-check each record's content at least this often
  daily_verify_budget: 600  # cap on queue-driven detail fetches per run
  window_days: 14           # re-fetch anything published in the last N days
  sweep_after_days: 31      # full re-verification due after this many days

# Joint ESAs Q&As — discovered via the Joint Q&A Register (the canonical index
# of Q&As answered jointly across EBA/EIOPA/ESMA). One register query returns
# every joint Q&A with its receiving authority, native detail-page id and a
# direct answer link; we fetch that authority's detail page for the content.
# register_act matches the register's "Legal act" by substring; statuses are
# the register Status values to mirror (Final includes EU-Commission answers).
joint_acts:
  DORA:
    register_act: "DORA"
    act_ref: "2022/2554"
    # "Revised" is a real register state (a revised final answer): without it a
    # Final→Revised transition would fall out of discovery, mis-marking the
    # record delisted and never mirroring the revised content.
    statuses: ["Final", "Revised"]

# EBA Single Rulebook Q&As — banking-sector acts that live solely at the EBA
# (no Joint Q&As). Add further banking acts here as needed (config only):
#   38 = PSD2  ·  31 = BRRD  ·  18 = MiCAR
# Caution: CRR alone is a very large corpus (years of Q&As) — long first run.
eba:
  legal_act_ids: [32, 33]      # 32 = CRD (Directive 2013/36/EU) · 33 = CRR (575/2013)
  default_act_ref: "2013/36"
  # /search is the finals-only tab (statuses live on sibling tabs); this
  # post-filter is a safety net, not the primary status selection.
  require_status: "Final"
  # Listing-page budget (20 Q&As per page). The pre-flight check against the
  # portal's count endpoint fails the run in minute 1 if this is too small.
  max_pages: 600
