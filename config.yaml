# What to mirror. This tool is scoped to BANKING supervision: the EBA Single
# Rulebook Q&As (banking-sector acts) plus the Joint ESAs Q&As that also bind
# credit institutions (DORA today). Two discovery sources — the Joint Q&A
# Register for joint acts, the EBA's own search for sectoral acts.

delay_seconds: 1.5

# Joint ESAs Q&As — discovered via the Joint Q&A Register (the canonical index
# of Q&As answered jointly across EBA/EIOPA/ESMA). One register query returns
# every joint Q&A with its receiving authority, native detail-page id and a
# direct answer link; we fetch that authority's detail page for the content.
# register_act matches the register's "Legal act" by substring; statuses are
# the register Status values to mirror (Final includes EU-Commission answers).
joint_acts:
  DORA:
    register_act: "DORA"
    act_ref: "2022/2554"
    statuses: ["Final"]

# EBA Single Rulebook Q&As — banking-sector acts that live solely at the EBA
# (no Joint Q&As). Add further banking acts here as needed (config only):
#   33 = CRR (575/2013)  ·  38 = PSD2  ·  31 = BRRD  ·  18 = MiCAR
# Caution: CRR alone is a very large corpus (years of Q&As) — long first run.
eba:
  legal_act_ids: [32]          # 32 = CRD (Directive 2013/36/EU)
  default_act_ref: "2013/36"
  # The EBA search has no status facet; this post-filter keeps only finals.
  require_status: "Final"
