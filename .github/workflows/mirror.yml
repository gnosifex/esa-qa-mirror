name: mirror

on:
  schedule:
    - cron: "17 5 * * 1"   # Mondays 05:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

# Never two mirror runs at once (manual dispatch vs cron) — they would race
# on the state.json/data commit.
concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      # Pinned to full commit SHAs (repo setting "Require actions to be pinned
      # to a full-length commit SHA"). Update SHAs deliberately when bumping.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      # Partial failures must not lose the successful part: the mirror step is
      # decoupled from the commit step and its outcome re-raised at the end,
      # so the run still commits what it got but ends red on any error.
      - name: Mirror
        id: mirror
        continue-on-error: true
        run: python -m qa_mirror
      - run: python -m qa_mirror.site
      - name: Commit changes
        run: |
          git config user.name "esa-qa-mirror bot"
          git config user.email "actions@users.noreply.github.com"
          git add data state.json docs
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "mirror: $(date -u +%F) delta"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
      - name: Fail on mirror errors
        if: steps.mirror.outcome == 'failure'
        run: |
          echo "mirror run reported errors — see the Mirror step log and job summary"
          exit 1
