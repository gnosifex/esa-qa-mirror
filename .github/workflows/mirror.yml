name: mirror

on:
  schedule:
    - cron: "17 5 * * 1"   # Mondays 05:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      # Pinned to full commit SHAs (repo setting "Require actions to be pinned
      # to a full-length commit SHA"). Update SHAs deliberately when bumping.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m qa_mirror
      - name: Commit changes
        run: |
          git config user.name "esa-qa-mirror bot"
          git config user.email "actions@users.noreply.github.com"
          git add data state.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "mirror: $(date -u +%F) delta"
          git push
