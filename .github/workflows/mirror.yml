name: mirror

on:
  schedule:
    - cron: "17 4 * * *"   # daily 04:17 UTC — the run is idempotent, and a
                             # daily delta caps worst-case latency at ~1 day
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

# Never two mirror runs at once (manual dispatch vs cron) — they would race
# on the state.json/data commit.
concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # a full CRR-scale first run needs ~1h; generous headroom
    steps:
      # Pinned to full commit SHAs (repo setting "Require actions to be pinned
      # to a full-length commit SHA"). Update SHAs deliberately when bumping.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # branch tip, not the event-time snapshot: schedule runs are pinned
          # to the commit at trigger time, so a delayed cron would execute
          # outdated code and rebase its state commit onto a stale base
          # (seen live 2026-07-10: a 3h-late cron ran pre-fix code and its
          # commit step failed on the rebase)
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      # Partial failures must not lose the successful part: the mirror step is
      # decoupled from the commit step and its outcome re-raised at the end,
      # so the run still commits what it got but ends red on any error.
      - name: Mirror
        id: mirror
        continue-on-error: true
        run: python -m qa_mirror
      - name: Commit changes
        run: |
          git config user.name "esa-qa-mirror bot"
          git config user.email "actions@users.noreply.github.com"
          git add data state.json runs.jsonl
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "mirror: $(date -u +%F) delta"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
      - name: Fail on mirror errors
        if: steps.mirror.outcome == 'failure'
        run: |
          echo "mirror run reported errors — see the Mirror step log and job summary"
          exit 1

  # Rebuild + deploy the search site from the (possibly partial) fresh data.
  # Runs even when the mirror job ended red — partial results are committed
  # and the site should reflect them.
  deploy:
    needs: mirror
    if: ${{ !cancelled() }}
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
