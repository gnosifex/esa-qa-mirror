name: probe

# Manual diagnostics for the portal adapters. Use when a mirror run delists
# or imports implausibly — distinguishes portal changes from runner-specific
# responses (the 2026-07 portal migrations exposed cache nodes that randomly
# ignore query strings; see qa_mirror/eiopa.py and qa_mirror/esma.py).

on:
  workflow_dispatch: {}

permissions: {}

jobs:
  # End-to-end smoke test of the actual adapters against the live portals
  # (throwaway workspace — nothing is committed).
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m qa_mirror --authority esma --limit 5
      - run: python -m qa_mirror --authority eiopa --limit 5
      - run: python -m qa_mirror --authority eba --limit 5

  # Raw looks at what the portals serve this runner.
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UA: "esa-qa-mirror/0.1 (+https://github.com/gnosifex/esa-qa-mirror; public Q&A archival tool; contact via repo issues)"
    steps:
      - name: Joint Q&A Register PowerBI backend (conceptualschema 400 diagnosis)
        run: |
          pip install --quiet requests
          python3 - <<'PY'
          import requests
          KEY = "e190a6e7-a75d-4543-b3e3-5d1a328e663e"
          HOST = "wabi-west-europe-d-primary-api.analysis.windows.net"
          H = {"X-PowerBI-ResourceKey": KEY, "User-Agent": "esa-qa-mirror-probe"}
          s = requests.Session()
          m = s.get(f"https://{HOST}/public/reports/{KEY}/modelsAndExploration"
                    "?preferReadOnlySession=true", headers=H, timeout=60)
          print("modelsAndExploration:", m.status_code)
          mj = m.json()
          model = mj["models"][0]
          mid = model["id"]
          rep = (mj.get("exploration") or {}).get("report", {}).get("objectId")
          print("  modelId=%r (%s)  dbName=%r  reportId=%r"
                % (mid, type(mid).__name__, model.get("dbName"), rep))
          for attempt in range(3):
              cs = s.post(f"https://{HOST}/public/reports/conceptualschema",
                          headers=H,
                          json={"userPreferredLocale": "en-US", "models": [mid]},
                          timeout=60)
              print(f"conceptualschema attempt {attempt}: {cs.status_code}")
              print("  body:", cs.text[:1500])
              if cs.status_code == 200:
                  break
          PY
      - name: EIOPA XLSX export (the listing source)
        run: |
          curl -sSL -A "$UA" "https://www.eiopa.europa.eu/sites/default/files/export_qa/eiopa-qa.xlsx" -o qa.xlsx -w "HTTP %{http_code}, %{size_download} bytes, type: %{content_type}\n"
          file qa.xlsx
      - name: ESMA alternative sources — jsonapi, sitemap, detail-page act markers
        run: |
          echo "== /jsonapi root:"
          curl -sS -A "$UA" "https://www.esma.europa.eu/jsonapi" -o j.json -w "HTTP %{http_code}, %{size_download} bytes, type: %{content_type}\n"
          python3 -c "import json;d=json.load(open('j.json'));links=d.get('links',{});print(len(links),'resource types');print([k for k in links if 'qa' in k.lower()][:10])" 2>/dev/null || head -c 300 j.json
          echo ""
          echo "== sitemap:"
          curl -sS -A "$UA" "https://www.esma.europa.eu/sitemap.xml" -o sm.xml -w "HTTP %{http_code}, %{size_download} bytes\n"
          grep -o '<loc>[^<]*</loc>' sm.xml | head -5
          grep -c 'questions-answers' sm.xml || true
          echo "== DORA detail page (2103): possible act markers"
          curl -sS -A "$UA" "https://www.esma.europa.eu/publications-data/questions-answers/2103" -o d1.html -w "HTTP %{http_code}\n"
          grep -io 'dora\|2022/2554' d1.html | sort | uniq -c | head -5
          grep -oE 'field--name-[a-z-]+' d1.html | sort -u | head -20
          echo "== non-DORA detail page (2856): same markers"
          curl -sS -A "$UA" "https://www.esma.europa.eu/publications-data/questions-answers/2856" -o d2.html -w "HTTP %{http_code}\n"
          grep -io 'dora\|2022/2554' d2.html | sort | uniq -c | head -5
      - name: ESMA detail field contents (act labeling)
        run: |
          for id in 2103 2856; do
            echo "=== $id"
            curl -sS -A "$UA" "https://www.esma.europa.eu/publications-data/questions-answers/$id" -o d.html -w "HTTP %{http_code}\n"
            python3 - <<'PY'
          import re
          html = open("d.html").read()
          for name in ("field-qa-list-of-topics", "field-qa-level", "field-qa-subject-matter"):
              m = re.search(rf'field--name-{name}.*?</div>\s*</div>', html, re.S)
              chunk = re.sub(r"<[^>]+>", " ", m.group(0))[:400] if m else "(not found)"
              print(f"--- {name}:", re.sub(r"\s+", " ", chunk).strip()[:300])
          PY
          done
      - name: ESMA listing (cookie bypass + full exposed-form params)
        run: |
          base="https://www.esma.europa.eu/esma-qa-search-page/final?field_qa_serial_value=&combine_keywords_qa_search=&field_qa_level1_target_id%5B0%5D=20010&created%5Bmin%5D=&created%5Bmax%5D="
          curl -sS -A "$UA" -H "Cookie: esa_qa_mirror=1" "$base" -o page.html -w "HTTP %{http_code}, %{size_download} bytes\n"
          echo "detail links:"
          grep -o 'href="/publications-data/questions-answers/[0-9]*"' page.html | sort -u | head -15 || echo "NONE"
          echo "pager pages advertised:"
          grep -oE '[?&;]page=[0-9]+' page.html | sort -u | head -8 || echo "none"
