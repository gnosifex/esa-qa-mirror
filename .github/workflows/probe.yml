name: probe

# Manual diagnostics for the portal adapters. Use when a mirror run delists
# or imports implausibly — distinguishes portal changes from runner-specific
# responses (the 2026-07 portal migrations exposed cache nodes that randomly
# ignore query strings; see qa_mirror/eiopa.py and qa_mirror/esma.py).

on:
  workflow_dispatch: {}

permissions: {}

jobs:
  # End-to-end smoke test of the actual adapters against the live portals
  # (throwaway workspace — nothing is committed).
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: EBA date facet — does qa_final_publishing_date_start filter server-side?
        run: |
          python3 - <<'PY'
          import re
          from qa_mirror.common import Http
          from qa_mirror import eba
          http = Http(delay=1.0)
          base = f"{eba.BASE}/single-rule-book-qa/search?qa_legal_act%5B%5D=32&qa_legal_act%5B%5D=33"
          def links(url):
              return len(set(re.findall(r'qna/view/publicId/([^"]+)"', http.get(url).text)))
          print("unfiltered page 0 links:", links(base))
          for fmt, label in (("01/06/2026", "DD/MM/YYYY"), ("2026-06-01", "YYYY-MM-DD")):
              from urllib.parse import quote
              n = links(f"{base}&qa_final_publishing_date_start={quote(fmt, safe='')}")
              print(f"since {label} ({fmt}): page-0 links = {n}")
          # count endpoint with the date param (both formats)
          for fmt in ("01/06/2026", "2026-06-01"):
              from urllib.parse import quote
              r = http.get(f"{eba.BASE}/qa-search-count?qa_legal_act%5B%5D=32&qa_legal_act%5B%5D=33&qa_final_publishing_date_start={quote(fmt, safe='')}",
                           headers={"X-Requested-With": "XMLHttpRequest"})
              print(f"count endpoint, start={fmt}:", r.text[:200].replace("\n", " "))
          PY
      - name: Register row inspection — DORA138 / native-id vs link mismatch
        run: |
          python3 - <<'PY'
          from qa_mirror import register
          rows = register.fetch_rows()
          # every row whose link id disagrees with the register's native id —
          # a mismatch means the "Link to the answer" points at the wrong doc
          mism = [r for r in rows
                  if r["native_id"] and r["link"].rstrip("/").rsplit("/", 1)[-1]
                  != r["native_id"] and r["native_id"] not in r["link"]]
          print(f"=== link/native-id mismatches: {len(mism)} of {len(rows)} rows")
          for r in mism:
              print(f"  {r['joint_id']} {r['authority']} native={r['native_id']!r} "
                    f"act={r['legal_act_raw']!r} link={r['link']}")
          print("=== DORA13x rows in full")
          for r in rows:
              if r["joint_id"].startswith("DORA13"):
                  print(" ", r)
          print("=== any row linking to esma 2364")
          for r in rows:
              if "2364" in r["link"] or r["native_id"] == "2364":
                  print(" ", r)
          PY
      - run: python -m qa_mirror --authority esma --limit 5
      - run: python -m qa_mirror --authority eiopa --limit 5
      - run: python -m qa_mirror --authority eba --limit 5
      - name: EBA listing via adapter — single vs multi act (does [32,33] discover?)
        run: |
          python3 - <<'PY'
          from itertools import islice
          from qa_mirror.common import Http
          from qa_mirror import eba
          http = Http(delay=1.0)
          for ids in ([32], [32, 33]):
              urls = list(islice(eba.list_detail_urls(http, {"legal_act_ids": ids}), 45))
              print(f"acts {ids}: {len(urls)} urls from first pages; first 3:", urls[:3])
          PY
      - name: Register status values — distinct, with counts (Revised handling)
        run: |
          python3 - <<'PY'
          from collections import Counter
          from qa_mirror import register
          rows = register.fetch_rows()
          print("total rows:", len(rows))
          print("status values, all acts:", Counter(r["status"] for r in rows))
          dora = [r for r in rows if "DORA" in (r["legal_act_raw"] or "")]
          print("DORA rows:", len(dora),
                "status values:", Counter(r["status"] for r in dora))
          PY

      - name: Register rows with broken link cells — synthesis + live fetch check
        run: |
          python3 - <<'PY'
          from qa_mirror.common import Http
          from qa_mirror import cli, register
          http = Http(delay=1.5)
          rows = register.fetch_rows()
          broken = [r for r in rows
                    if not str(r.get("link") or "").startswith("http")
                    and r["status"] in ("Final", "Revised")]
          print(f"{len(broken)} Final/Revised rows with non-URL link cells")
          for r in broken:
              cands = register.synth_links(r)
              print(f"  {r['joint_id']} ({r['authority']}, {r['status']}): link={r['link']!r}")
              print(f"    candidates: {cands}")
              if cands:
                  try:
                      rec = cli._fetch_first(cli.ADAPTERS[r["authority"]], http, cands)
                      print(f"    FETCH OK -> qa_id={rec.qa_id!r} status={rec.status!r}")
                  except Exception as exc:
                      print(f"    FETCH FAILED: {exc}")
          PY
      - name: Cross-check EBA DORA finals (act 20) against the register
        run: |
          python3 - <<'PY'
          import re
          from qa_mirror.common import Http
          from qa_mirror import eba, register
          http = Http(delay=1.0)
          rows = register.fetch_rows()
          reg_ids = {str(r.get("link") or "").rstrip("/").rsplit("/", 1)[-1] for r in rows}
          reg_ids |= {str(r.get("native_id") or "") for r in rows}
          for r in rows:  # ids embedded in broken (title-instead-of-URL) cells
              m = re.search(r"\b(\d{4}_\d+)\b", str(r.get("link") or ""))
              if m:
                  reg_ids.add(m.group(1))
          urls = list(eba.list_detail_urls(http, {"legal_act_ids": [20], "max_pages": 30}))
          ids = [u.rsplit("/", 1)[-1] for u in urls]
          solo = [i for i in ids
                  if i not in reg_ids and i.split("_")[-1] not in reg_ids]
          print(f"{len(ids)} EBA DORA finals; {len(solo)} without any register trace:", solo)
          PY

  # Raw looks at what the portals serve this runner.
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UA: "esa-qa-mirror/0.1 (+https://github.com/gnosifex/esa-qa-mirror; public Q&A archival tool; contact via repo issues)"
    steps:
      - name: Joint Q&A Register PowerBI backend (conceptualschema 400 diagnosis)
        run: |
          pip install --quiet requests
          python3 - <<'PY'
          import requests
          KEY = "e190a6e7-a75d-4543-b3e3-5d1a328e663e"
          HOST = "wabi-west-europe-d-primary-api.analysis.windows.net"
          H = {"X-PowerBI-ResourceKey": KEY, "User-Agent": "esa-qa-mirror-probe"}
          s = requests.Session()
          m = s.get(f"https://{HOST}/public/reports/{KEY}/modelsAndExploration"
                    "?preferReadOnlySession=true", headers=H, timeout=60)
          print("modelsAndExploration:", m.status_code)
          mj = m.json()
          model = mj["models"][0]
          mid = model["id"]
          rep = (mj.get("exploration") or {}).get("report", {}).get("objectId")
          print("  modelId=%r (%s)  dbName=%r  reportId=%r"
                % (mid, type(mid).__name__, model.get("dbName"), rep))
          for attempt in range(3):
              cs = s.post(f"https://{HOST}/public/reports/conceptualschema",
                          headers=H,
                          json={"userPreferredLocale": "en-US", "models": [mid]},
                          timeout=60)
              print(f"conceptualschema attempt {attempt}: {cs.status_code}")
              print("  body:", cs.text[:1500])
              if cs.status_code == 200:
                  break
          PY
      - name: EIOPA XLSX export (the listing source)
        run: |
          curl -sSL -A "$UA" "https://www.eiopa.europa.eu/sites/default/files/export_qa/eiopa-qa.xlsx" -o qa.xlsx -w "HTTP %{http_code}, %{size_download} bytes, type: %{content_type}\n"
          file qa.xlsx
      - name: ESMA alternative sources — jsonapi, sitemap, detail-page act markers
        run: |
          echo "== /jsonapi root:"
          curl -sS -A "$UA" "https://www.esma.europa.eu/jsonapi" -o j.json -w "HTTP %{http_code}, %{size_download} bytes, type: %{content_type}\n"
          python3 -c "import json;d=json.load(open('j.json'));links=d.get('links',{});print(len(links),'resource types');print([k for k in links if 'qa' in k.lower()][:10])" 2>/dev/null || head -c 300 j.json
          echo ""
          echo "== sitemap:"
          curl -sS -A "$UA" "https://www.esma.europa.eu/sitemap.xml" -o sm.xml -w "HTTP %{http_code}, %{size_download} bytes\n"
          grep -o '<loc>[^<]*</loc>' sm.xml | head -5
          grep -c 'questions-answers' sm.xml || true
          echo "== DORA detail page (2103): possible act markers"
          curl -sS -A "$UA" "https://www.esma.europa.eu/publications-data/questions-answers/2103" -o d1.html -w "HTTP %{http_code}\n"
          grep -io 'dora\|2022/2554' d1.html | sort | uniq -c | head -5
          grep -oE 'field--name-[a-z-]+' d1.html | sort -u | head -20
          echo "== non-DORA detail page (2856): same markers"
          curl -sS -A "$UA" "https://www.esma.europa.eu/publications-data/questions-answers/2856" -o d2.html -w "HTTP %{http_code}\n"
          grep -io 'dora\|2022/2554' d2.html | sort | uniq -c | head -5
      - name: ESMA detail field contents (act labeling)
        run: |
          for id in 2103 2856; do
            echo "=== $id"
            curl -sS -A "$UA" "https://www.esma.europa.eu/publications-data/questions-answers/$id" -o d.html -w "HTTP %{http_code}\n"
            python3 - <<'PY'
          import re
          html = open("d.html").read()
          for name in ("field-qa-list-of-topics", "field-qa-level", "field-qa-subject-matter"):
              m = re.search(rf'field--name-{name}.*?</div>\s*</div>', html, re.S)
              chunk = re.sub(r"<[^>]+>", " ", m.group(0))[:400] if m else "(not found)"
              print(f"--- {name}:", re.sub(r"\s+", " ", chunk).strip()[:300])
          PY
          done
      - name: ESMA listing (cookie bypass + full exposed-form params)
        run: |
          base="https://www.esma.europa.eu/esma-qa-search-page/final?field_qa_serial_value=&combine_keywords_qa_search=&field_qa_level1_target_id%5B0%5D=20010&created%5Bmin%5D=&created%5Bmax%5D="
          curl -sS -A "$UA" -H "Cookie: esa_qa_mirror=1" "$base" -o page.html -w "HTTP %{http_code}, %{size_download} bytes\n"
          echo "detail links:"
          grep -o 'href="/publications-data/questions-answers/[0-9]*"' page.html | sort -u | head -15 || echo "NONE"
          echo "pager pages advertised:"
          grep -oE '[?&;]page=[0-9]+' page.html | sort -u | head -8 || echo "none"
      - name: EBA search listing — result count, per-page size, pager, facets
        run: |
          url="https://www.eba.europa.eu/single-rule-book-qa/search?qa_legal_act%5B%5D=32&qa_legal_act%5B%5D=33"
          curl -sS -A "$UA" "$url" -o s0.html -w "HTTP %{http_code}, %{size_download} bytes\n"
          echo "== detail links on page 0:"
          grep -o 'href="/single-rule-book-qa/qna/view/publicId/[^"]*"' s0.html | sort -u | wc -l
          echo "== candidate result-count markup (text nodes with a number >= 2 digits):"
          grep -oiE '[^<>]*\b[0-9]{2,}\b[^<>]*' s0.html | grep -viE 'px|width|height|20[0-9][0-9]-|\.js|\.css' | head -15
          echo "== headings/summary elements:"
          grep -oiE '<(h[1-6]|div|span|p)[^>]*(count|result|total|summary)[^>]*>[^<]*' s0.html | head -10
          echo "== pager links (highest page numbers advertised):"
          grep -oE '[?&;]page=[0-9]+' s0.html | grep -oE '[0-9]+' | sort -n -u | tail -5
          echo "== form facet fields (server-side filter candidates, e.g. a status facet):"
          grep -oE '<(input|select)[^>]*name="[^"]*"' s0.html | grep -oE 'name="[^"]*"' | sort -u
          echo "== select options (facet values):"
          grep -oE '<option[^>]*value="[^"]*"[^>]*>[^<]*' s0.html | head -30
          echo "== page 1 (per-page size cross-check):"
          curl -sS -A "$UA" "$url&page=1" -o s1.html -w "HTTP %{http_code}\n"
          grep -o 'href="/single-rule-book-qa/qna/view/publicId/[^"]*"' s1.html | sort -u | wc -l
      - name: EBA archive listing — path, links, pager (x_archived resolution)
        run: |
          for u in "https://www.eba.europa.eu/single-rule-book-qa/archive" \
                   "https://www.eba.europa.eu/single-rule-book-qa/archive?page=1"; do
            echo "=== $u"
            curl -sS -A "$UA" -L "$u" -o a.html -w "HTTP %{http_code}, %{size_download} bytes\n"
            echo "-- detail links (count, first 5):"
            grep -o 'href="/single-rule-book-qa/qna/view/publicId/[^"]*"' a.html | sort -u | wc -l
            grep -o 'href="/single-rule-book-qa/qna/view/publicId/[^"]*"' a.html | sort -u | head -5 || true
            echo "-- candidate count markup:"
            grep -oiE '[^<>]*\b[0-9]{2,}\b[^<>]*(archive|result|q&amp;a)[^<>]*|[^<>]*(archive|result)[^<>]*\b[0-9]{2,}\b[^<>]*' a.html | head -5 || true
            echo "-- pager:"
            grep -oE '[?&;]page=[0-9]+' a.html | sort -u | tail -3 || true
            echo "-- facet fields:"
            grep -oE '<(input|select)[^>]*name="[^"]*"' a.html | grep -oE 'name="[^"]*"' | sort -u | head -10 || true
          done
      - name: EBA qa-search-count endpoint (pre-flight totals) + tab/pager anatomy
        run: |
          for q in "qa_legal_act%5B%5D=32" "qa_legal_act%5B%5D=32&qa_legal_act%5B%5D=33" ""; do
            echo "=== /qa-search-count?$q"
            curl -sS -A "$UA" "https://www.eba.europa.eu/qa-search-count?$q" -w "\nHTTP %{http_code}\n" | head -c 800
            echo ""
          done
          echo "=== search page 0, SINGLE act 32 (does server-side rendering depend on act count?):"
          curl -sS -A "$UA" "https://www.eba.europa.eu/single-rule-book-qa/search?qa_legal_act%5B%5D=32" -o s0b.html -w "HTTP %{http_code}, %{size_download} bytes\n"
          grep -c 'single-rule-book-qa/qna/view/publicId' s0b.html || true
          echo "=== search page 1, single act 32:"
          curl -sS -A "$UA" "https://www.eba.europa.eu/single-rule-book-qa/search?qa_legal_act%5B%5D=32&page=1" -o s1b.html -w "HTTP %{http_code}, %{size_download} bytes\n"
          grep -c 'single-rule-book-qa/qna/view/publicId' s1b.html || true
          echo "=== status-tab links visible on the search page:"
          grep -oE 'href="[^"]*single-rule-book-qa[^"]*"' s0b.html | grep -v publicId | sort -u | head -10 || true
          echo "=== archive pager raw hrefs (full attributes, page 0):"
          curl -sS -A "$UA" "https://www.eba.europa.eu/single-rule-book-qa/archive" -o a0.html -w "HTTP %{http_code}\n"
          grep -oE 'href="[^"]*page=[0-9]+[^"]*"' a0.html | sort -u | head -10 || true
          echo "=== archive page=1 retry (cache-bust):"
          curl -sS -A "$UA" "https://www.eba.europa.eu/single-rule-book-qa/archive?page=1&cb=$RANDOM" -o a1b.html -w "HTTP %{http_code}, %{size_download} bytes\n"
          grep -c 'single-rule-book-qa/qna/view/publicId' a1b.html || true
      - name: EBA AJAX listing — drupalSettings ajaxViews, views/ajax POST, count endpoint
        run: |
          pip install --quiet requests
          python3 - <<'PY'
          import json, re, requests
          UA = {"User-Agent": "esa-qa-mirror/0.1 (+https://github.com/gnosifex/esa-qa-mirror; probe)"}
          s = requests.Session()
          base = "https://www.eba.europa.eu"

          # flakiness measurement: how often is the listing server-rendered?
          for i in range(4):
              r = s.get(f"{base}/single-rule-book-qa/search",
                        params={"qa_legal_act[]": "32", "cb": i}, headers=UA, timeout=30)
              n = len(re.findall(r"qna/view/publicId", r.text))
              print(f"plain fetch {i}: HTTP {r.status_code}, publicId hits: {n}")

          # the All tab — server-rendered?
          r = s.get(f"{base}/single-rule-book-qa/all", params={"qa_legal_act[0]": "32"},
                    headers=UA, timeout=30)
          print("all-tab: HTTP", r.status_code, "publicId hits:",
                len(re.findall(r"qna/view/publicId", r.text)))

          # extract drupalSettings from the search page
          r = s.get(f"{base}/single-rule-book-qa/search",
                    params={"qa_legal_act[]": "32"}, headers=UA, timeout=30)
          m = re.search(r'data-drupal-selector="drupal-settings-json">(.*?)</script>',
                        r.text, re.S)
          if not m:
              print("NO drupalSettings found"); raise SystemExit(0)
          cfg = json.loads(m.group(1))
          views = (cfg.get("views") or {}).get("ajaxViews") or {}
          print("ajaxViews instances:", len(views))
          for k, v in views.items():
              print(" ", k, json.dumps(v)[:400])
          print("eba_qa settings:", json.dumps(cfg.get("eba_qa", {}))[:300])

          # try the views/ajax POST the frontend pager uses
          for k, v in list(views.items())[:1]:
              data = {
                  "view_name": v.get("view_name"),
                  "view_display_id": v.get("view_display_id"),
                  "view_args": v.get("view_args", ""),
                  "view_path": v.get("view_path", ""),
                  "view_base_path": v.get("view_base_path", ""),
                  "view_dom_id": v.get("view_dom_id", ""),
                  "pager_element": v.get("pager_element", 0),
                  "page": 1,
                  "qa_legal_act[]": "32",
              }
              r = s.post(f"{base}/views/ajax", data=data, headers={
                  **UA, "X-Requested-With": "XMLHttpRequest"}, timeout=30)
              print("views/ajax POST:", r.status_code, "publicId hits:",
                    len(re.findall(r"qna/view/publicId", r.text)))
              print("  body head:", r.text[:300].replace("\n", " "))

          # count endpoint, as the frontend calls it (XHR header)
          r = s.get(f"{base}/qa-search-count", params={"qa_legal_act[]": "32"},
                    headers={**UA, "X-Requested-With": "XMLHttpRequest"}, timeout=30)
          print("qa-search-count XHR:", r.status_code, "body:", r.text[:400].replace("\n", " "))
          PY
