name: pages

# Deploys the search site: docs/index.html (committed) + records-*.json/
# manifest.json (build artifacts, generated here — NOT committed; the repo
# holds the corpus once, in data/). Requires Pages source "GitHub Actions"
# (repo Settings → Pages). Runs on relevant pushes to main, manually, and as
# the final step of every mirror run (mirror.yml calls this workflow — the
# mirror bot's push cannot trigger the push event itself).

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "docs/**"
      - "qa_mirror/**"
      - "requirements.txt"
  workflow_dispatch: {}
  workflow_call: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pinned to full commit SHAs (repo setting "Require actions to be pinned
      # to a full-length commit SHA"). Update SHAs deliberately when bumping.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # branch tip, not the triggering SHA: when called from the mirror
          # run, the mirror job's fresh data commit must be included
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m qa_mirror.site
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
