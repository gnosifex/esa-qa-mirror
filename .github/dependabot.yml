version: 2
updates:
  # Proposes PRs bumping the SHA-pinned actions when new releases appear —
  # complements the "require full-length SHA" repo setting.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
